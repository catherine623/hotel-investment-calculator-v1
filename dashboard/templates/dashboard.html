<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒店投资计算器 · 后台数据看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f5f7fa;
  --card: #ffffff;
  --border: #e8ecf1;
  --text: #2c3e50;
  --muted: #94a3b8;
  --accent: #6366f1;
  --accent-light: #eef2ff;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --orange: #f59e0b;
  --orange-bg: #fffbeb;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --blue: #3b82f6;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg); color: var(--text); min-height:100vh;
  line-height: 1.5;
}
body.loading { cursor:wait; }

/* 顶栏 */
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}
header h1 { font-size: 20px; font-weight: 600; color: var(--text); }
header h1 span { color: var(--accent); }
.header-right { display: flex; gap: 12px; align-items: center; }
.header-right select, .header-right button {
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--card); color: var(--text); font-size: 13px; cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.header-right select:hover { border-color: var(--accent); }
.header-right button.refresh {
  background: var(--accent); border-color: var(--accent); color: white; font-weight: 500;
}
.header-right button.refresh:hover { background: #4f46e5; }
.last-update { font-size: 12px; color: var(--muted); }

/* 概览卡片 */
.overview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  padding: 24px 32px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s;
}
.stat-card:hover { box-shadow: var(--shadow-hover); }
.stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 500; }
.stat-card .value { font-size: 32px; font-weight: 700; line-height: 1.15; }
.stat-card .sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
.stat-card.accent { border-top: 3px solid var(--accent); background: var(--accent-light); }
.stat-card.accent .value { color: var(--accent); }
.stat-card.green { border-top: 3px solid var(--green); background: var(--green-bg); }
.stat-card.green .value { color: var(--green); }
.stat-card.orange { border-top: 3px solid var(--orange); background: var(--orange-bg); }
.stat-card.orange .value { color: var(--orange); }

/* 图表区 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
  gap: 16px;
  padding: 0 32px 24px;
}
.grid.full { grid-template-columns: 1fr; }
.grid.col3 { grid-template-columns: repeat(3, 1fr); }
.chart-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 24px;
  position: relative;
  box-shadow: var(--shadow);
}
.chart-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; color: var(--text); }
.chart-box h3 .badge { font-size: 11px; padding: 2px 10px; border-radius: 10px; background: var(--accent); color: white; font-weight: 500; }
.chart-box canvas { max-height: 300px; }

/* 判词分布 */
.verdict-bars { display: flex; gap: 12px; margin-top: 8px; }
.verdict-bar { flex:1; text-align:center; }
.verdict-bar .bar { height: 8px; border-radius: 4px; margin-bottom: 6px; }
.verdict-bar .label { font-size: 12px; color: var(--muted); }
.verdict-bar .count { font-size: 20px; font-weight: 700; }

/* Phase divider */
.section-divider {
  padding: 8px 32px 0;
  font-size: 12px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.5px; text-transform: uppercase;
}

/* 最近提交表格 */
.table-wrap { overflow-x: auto; }
.table-wrap::-webkit-scrollbar { height: 6px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; white-space: nowrap; position: sticky; top: 0; background: var(--card); z-index: 1; }
td { white-space: nowrap; color: var(--text); }
tr:hover td { background: #f8fafc; }
.tag { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.tag-feasible { background: #dcfce7; color: #166534; }
.tag-challenging { background: #fef3c7; color: #92400e; }
.tag-difficult { background: #fee2e2; color: #b91c1c; }
.tag-impossible { background: #fce7f3; color: #9d174d; }

/* 加载/空状态 */
.loading-overlay {
  display: none;
  position: absolute; inset:0;
  background: rgba(255,255,255,0.75); border-radius:12px;
  justify-content:center; align-items:center; flex-direction:column; gap:12px;
}
.loading-overlay.show { display:flex; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
footer {
  text-align: center; padding: 24px; color: var(--muted); font-size: 12px;
}

/* Scatter Legend */
.scatter-legend {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 12px;
}
.scatter-legend hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }

@media (max-width: 768px) {
  header { padding: 12px 16px; flex-direction: column; gap: 10px; align-items: flex-start; }
  .header-right { flex-wrap: wrap; }
  .overview { padding: 16px; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
  .grid { padding: 0 16px 16px; }
  .grid.col3 { grid-template-columns: 1fr; }
  .chart-box { overflow: hidden; }
}
</style>
</head>
<body class="loading">

<header>
  <h1>📊 酒店投资计算器 <span>数据看板</span></h1>
  <div class="header-right">
    <select id="modeFilter" onchange="refreshDashboard()">
      <option value="all">全部模式</option>
      <option value="standard">标准商务</option>
      <option value="resort">景区度假</option>
      <option value="esports">电竞酒店</option>
    </select>
    <select id="dayFilter" onchange="refreshDashboard()">
      <option value="7">最近 7 天</option>
      <option value="30" selected>最近 30 天</option>
      <option value="90">最近 90 天</option>
      <option value="365">全部时间</option>
    </select>
    <button class="refresh" onclick="refreshDashboard()">🔄 刷新</button>
    <span class="last-update" id="lastUpdate">—</span>
  </div>
</header>

<!-- 概览卡片 -->
<div class="overview" id="overview"></div>

<!-- 图表区 -->
<div class="grid col3">
  <div class="chart-box">
    <h3>📈 时间趋势</h3>
    <canvas id="chartTrend"></canvas>
  </div>
  <div class="chart-box">
    <h3>🎯 投资判词分布</h3>
    <div id="verdictChart"></div>
  </div>
  <div class="chart-box">
    <h3>🏨 酒店模式分布</h3>
    <canvas id="chartModes"></canvas>
  </div>
</div>

<div class="grid col3">
  <div class="chart-box">
    <h3>🏙️ 测算城市 Top 10</h3>
    <canvas id="chartCitiesTop10"></canvas>
  </div>
  <div class="chart-box">
    <h3>📊 城市等级偏好</h3>
    <canvas id="chartTiers"></canvas>
  </div>
  <div class="chart-box">
    <h3>💰 投资总额分布</h3>
    <canvas id="chartInvestDistribution"></canvas>
  </div>
</div>

<div class="grid full">
  <div class="chart-box">
    <h3>
      🗺️ 区域分布热力图
      <span style="font-weight:400;font-size:11px;color:var(--muted);margin-left:auto;">颜色越深=测算越多</span>
    </h3>
    <div id="regionHeatmap" style="display:flex;gap:12px;flex-wrap:wrap;min-height:160px;align-items:stretch;padding:10px 0;"></div>
  </div>
</div>

<div class="grid">
  <div class="chart-box">
    <h3>💰 ADR 房价区间 × GOP率</h3>
    <canvas id="chartADR"></canvas>
  </div>
  <div class="chart-box">
    <h3>⏱️ 回本年限分布</h3>
    <canvas id="chartPayback"></canvas>
  </div>
</div>

<!-- 散点图 - Premium 气泡版 -->
<div class="grid full">
  <div class="chart-box">
    <h3>
      🔍 投资分布全景 · 房间数 vs 投资额
      <span style="font-weight:400;font-size:11px;color:var(--muted);margin-left:auto;">气泡大小=投资规模 · 颜色=GOP率</span>
    </h3>
    <div style="display:flex;align-items:flex-start;gap:16px;">
      <canvas id="chartScatter" style="flex:1;max-height:380px;min-height:320px;"></canvas>
      <div class="scatter-legend" id="scatterLegend" style="min-width:160px;display:flex;flex-direction:column;gap:4px;padding-top:20px;"></div>
    </div>
    <div style="margin-top:8px;display:flex;gap:20px;font-size:11px;color:var(--muted);">
      <span>🟢 GOP≥55% 优质</span>
      <span>🟡 GOP 40-55% 一般</span>
      <span>🔴 GOP&lt;40% 风险</span>
      <span style="margin-left:auto;">悬停查看详情</span>
    </div>
  </div>
</div>

<!-- 最近提交 -->
<div class="grid full">
  <div class="chart-box">
    <h3>📋 最近提交 <span class="badge" id="recentCount">0</span></h3>
    <div class="table-wrap" id="recentTable" style="max-height: 400px; overflow-y: auto;"></div>
  </div>
</div>

<footer>酒店投资计算器 · 后台数据看板 v1.0</footer>

<script>
// ============================================================
// Dashboard Logic
// ============================================================
const API = window.location.origin + '/api/dashboard';

let chartInstances = {};
let currentData = null;

// ── Chart.js 全局配色（白底适配） ──
const C = {
  accent:     '#6366f1',
  accentBg:   'rgba(99,102,241,0.08)',
  green:      '#10b981',
  greenBg:    'rgba(16,185,129,0.08)',
  orange:     '#f59e0b',
  orangeBg:   'rgba(245,158,11,0.08)',
  red:        '#ef4444',
  pink:       '#ec4899',
  blue:       '#3b82f6',
  cyan:       '#06b6d4',
  cyanBg:     'rgba(6,182,212,0.08)',
  grid:       '#e8ecf1',
  tick:       '#94a3b8',
  text:       '#475569',
  white:      '#ffffff',
};

function destroyCharts() {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
}

async function refreshDashboard() {
  document.body.classList.add('loading');
  const mode = document.getElementById('modeFilter').value;
  const days = document.getElementById('dayFilter').value;
  
  try {
    const res = await fetch(`${API}?days=${days}&mode=${mode}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    currentData = await res.json();
    renderAll(currentData);
    document.getElementById('lastUpdate').textContent = 
      '更新于 ' + new Date(currentData.generated_at).toLocaleTimeString('zh-CN');
  } catch (e) {
    console.error('Dashboard load error:', e);
    showError('无法加载数据，请确认后端服务正在运行');
  }
  document.body.classList.remove('loading');
}

function showError(msg) {
  document.getElementById('overview').innerHTML = 
    `<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--muted)">
       ⚠️ ${msg}<br><small style="color:var(--muted)">API: ${API}</small>
     </div>`;
}

function chartOptions(extra = {}) {
  return Object.assign({
    responsive: true,
    maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: { legend: { labels: { color: C.text, usePointStyle: true, padding: 16, font: { size: 12 } } } }
  }, extra);
}

function defaultScales(overrides = {}) {
  const baseX = { ticks: { color: C.tick }, grid: { color: C.grid } };
  const baseY = { ticks: { color: C.tick }, grid: { color: C.grid } };
  return Object.assign({ x: baseX, y: baseY }, overrides);
}

function renderAll(d) {
  const s = d.summary, a = d.averages, v = d.verdicts;
  
  // ═══════ 概览卡片 ═══════
  document.getElementById('overview').innerHTML = `
    <div class="stat-card accent">
      <div class="label">总提交数</div>
      <div class="value">${s.total_submissions.toLocaleString()}</div>
      <div class="sub">独立用户 ${s.unique_users.toLocaleString()}</div>
    </div>
    <div class="stat-card green">
      <div class="label">有效数据</div>
      <div class="value">${s.clean_submissions.toLocaleString()}</div>
      <div class="sub">清洗率 ${s.total_submissions ? (s.clean_submissions/s.total_submissions*100).toFixed(1) : 0}%</div>
    </div>
    <div class="stat-card">
      <div class="label">平均 GOP率</div>
      <div class="value">${a.gop_ratio.toFixed(1)}%</div>
      <div class="sub">平均回本 ${a.payback_years.toFixed(1)} 年</div>
    </div>
    <div class="stat-card">
      <div class="label">平均 ADR</div>
      <div class="value">¥${Math.round(a.adr)}</div>
      <div class="sub">入住率 ${a.occupancy.toFixed(1)}% · ${Math.round(a.rooms)}间</div>
    </div>
    <div class="stat-card orange">
      <div class="label">平均投资额</div>
      <div class="value">¥${Math.round(a.investment)}万</div>
      <div class="sub">年营收 ¥${Math.round(a.revenue)}万</div>
    </div>
  `;
  
  // ═══════ 判词分布 ═══════
  const totalV = v.feasible + v.challenging + v.difficult + v.impossible || 1;
  const verdictColors = {
    green:  '#10b981',
    orange: '#f59e0b',
    red:    '#ef4444',
    pink:   '#ec4899'
  };
  document.getElementById('verdictChart').innerHTML = `
    <div class="verdict-bars">
      <div class="verdict-bar">
        <div class="count" style="color:${verdictColors.green}">${v.feasible}</div>
        <div class="bar" style="background:${verdictColors.green}; width:${(v.feasible/totalV*100).toFixed(0)}%"></div>
        <div class="label">✅ 可行</div>
      </div>
      <div class="verdict-bar">
        <div class="count" style="color:${verdictColors.orange}">${v.challenging}</div>
        <div class="bar" style="background:${verdictColors.orange}; width:${(v.challenging/totalV*100).toFixed(0)}%"></div>
        <div class="label">🔶 有挑战</div>
      </div>
      <div class="verdict-bar">
        <div class="count" style="color:${verdictColors.red}">${v.difficult}</div>
        <div class="bar" style="background:${verdictColors.red}; width:${(v.difficult/totalV*100).toFixed(0)}%"></div>
        <div class="label">🔴 压力大</div>
      </div>
      <div class="verdict-bar">
        <div class="count" style="color:${verdictColors.pink}">${v.impossible}</div>
        <div class="bar" style="background:${verdictColors.pink}; width:${(v.impossible/totalV*100).toFixed(0)}%"></div>
        <div class="label">⚠️ 不可行</div>
      </div>
    </div>
  `;
  
  destroyCharts();
  
  // ═══════ 时间趋势 ── 双轴折线 ═══════
  if (d.trend.length > 0) {
    chartInstances.trend = new Chart(document.getElementById('chartTrend'), {
      type: 'line',
      data: {
        labels: d.trend.map(r => r.day),
        datasets: [
          {
            label: '提交数', yAxisID: 'y',
            data: d.trend.map(r => r.count),
            borderColor: C.accent, backgroundColor: C.accentBg,
            fill: true, tension: 0.3, pointRadius: 3, pointBackgroundColor: C.accent,
            borderWidth: 2
          },
          {
            label: '平均回本(年)', yAxisID: 'y1',
            data: d.trend.map(r => r.avg_pb),
            borderColor: C.orange, borderDash: [5,3],
            tension: 0.3, pointRadius: 3, pointBackgroundColor: C.orange,
            borderWidth: 2
          }
        ]
      },
      options: chartOptions({
        scales: defaultScales({
          y: { type:'linear', position:'left', title:{display:true,text:'提交数',color:C.tick}, grid:{color:C.grid} },
          y1: { type:'linear', position:'right', title:{display:true,text:'年',color:C.tick}, ticks:{color:C.tick}, grid:{display:false} },
          x: { ticks:{color:C.tick, maxTicksLimit:10}, grid:{color:C.grid} }
        })
      })
    });
  }
  
  // ═══════ 酒店模式 ── 甜甜圈 ═══════
  if (d.hotel_modes.length > 0) {
    const modeLabels = { standard:'标准商务', resort:'景区度假', esports:'电竞酒店' };
    const modeColors = { standard: C.blue, resort: C.green, esports: C.pink };
    chartInstances.modes = new Chart(document.getElementById('chartModes'), {
      type: 'doughnut',
      data: {
        labels: d.hotel_modes.map(m => modeLabels[m.hotel_mode] || m.hotel_mode),
        datasets: [{
          data: d.hotel_modes.map(m => m.count),
          backgroundColor: d.hotel_modes.map(m => modeColors[m.hotel_mode] || C.accent),
          borderColor: C.white, borderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: C.text, usePointStyle: true, padding: 16, font: { size: 12 } } }
        }
      }
    });
  }
  
  // ═══════ 城市 Top 10 ── 横向柱状 ═══════
  if (d.cities.length > 0) {
    const top10 = d.cities.slice(0, 10);
    chartInstances.citiesTop10 = new Chart(document.getElementById('chartCitiesTop10'), {
      type: 'bar',
      data: {
        labels: top10.map(c => c.city),
        datasets: [{
          label: '测算次数',
          data: top10.map(c => c.count),
          backgroundColor: top10.map((_, i) => {
            const h = 215 - i * 10;
            return `hsla(${h}, 60%, 55%, 0.78)`;
          }),
          borderRadius: 5,
          borderSkipped: false
        }]
      },
      options: {
        indexAxis: 'y',
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { ticks:{color:C.tick}, grid:{color:C.grid}, title:{display:true,text:'测算次数',color:C.tick} },
          y: { ticks:{color:C.text, font:{size:12}} }
        },
        plugins: { legend: { display: false } }
      }
    });
  }
  
  // ═══════ 城市等级 ── 柱+折线 ═══════
  if (d.tiers.length > 0) {
    const tierLabels = {1:'一线', 2:'新一线/二线', 3:'三线', 4:'四线', 5:'五线'};
    chartInstances.tiers = new Chart(document.getElementById('chartTiers'), {
      type: 'bar',
      data: {
        labels: d.tiers.map(t => tierLabels[t.city_tier] || `T${t.city_tier}`),
        datasets: [
          {
            label: '提交数', yAxisID: 'y',
            data: d.tiers.map(t => t.count),
            backgroundColor: 'rgba(99,102,241,0.35)', borderRadius: 4
          },
          {
            label: '平均GOP率(%)', yAxisID: 'y1', type:'line',
            data: d.tiers.map(t => t.avg_gop),
            borderColor: C.green, backgroundColor: 'transparent',
            tension: 0.3, pointRadius: 5, pointBackgroundColor: C.green,
            borderWidth: 2
          }
        ]
      },
      options: chartOptions({
        scales: defaultScales({
          y: { position:'left', title:{display:true,text:'提交数',color:C.tick} },
          y1: { position:'right', title:{display:true,text:'GOP%',color:C.tick}, min:0, max:80, grid:{display:false} },
          x: { ticks:{color:C.text} }
        })
      })
    });
  }
  
  // ═══════ 投资总额分布 ── 环形图 ═══════
  if (d.investment_distribution && d.investment_distribution.length > 0) {
    const investColors = ['#a78bfa','#6366f1','#3b82f6','#06b6d4','#10b981','#f59e0b','#ef4444'];
    const totalInvest = d.investment_distribution.reduce((s,i)=>s+i.count, 0);
    chartInstances.investDist = new Chart(document.getElementById('chartInvestDistribution'), {
      type: 'doughnut',
      data: {
        labels: d.investment_distribution.map(i => i.bin),
        datasets: [{
          data: d.investment_distribution.map(i => i.count),
          backgroundColor: d.investment_distribution.map((_,i) => investColors[i] || C.accent),
          borderColor: C.white, borderWidth: 2
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { labels: { color: C.text, usePointStyle: true, padding: 12, font: { size: 11 } } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const item = d.investment_distribution[ctx.dataIndex];
                const pct = totalInvest > 0 ? (item.count/totalInvest*100).toFixed(1) : 0;
                return `${item.bin}: ${item.count}次 (${pct}%)`;
              }
            }
          }
        }
      }
    });
  }
  
  // ═══════ 区域热力图 ═══════
  if (d.regions && d.regions.length > 0) {
    const maxCount = Math.max(...d.regions.map(r => r.count));
    const regionHtml = d.regions.map(r => {
      const intensity = maxCount > 0 ? r.count / maxCount : 0;
      // 从浅蓝到深蓝
      const alpha = 0.22 + intensity * 0.58;
      const bgColor = `rgba(59,130,246,${alpha.toFixed(2)})`;
      const textColor = intensity > 0.6 ? '#1e3a5f' : '#475569';
      return `
        <div style="
          flex:1; min-width:120px; max-width:180px;
          background:${bgColor};
          border:2px solid ${intensity > 0.5 ? 'rgba(59,130,246,0.6)' : 'rgba(59,130,246,0.15)'};
          border-radius:14px;
          padding:18px 14px;
          text-align:center;
          display:flex;flex-direction:column;justify-content:center;align-items:center;
          transition:all 0.25s;
          cursor:default;
        "
        onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='0 6px 20px rgba(59,130,246,0.25)';"
        onmouseout="this.style.transform='';this.style.boxShadow='';"
        >
          <div style="font-size:13px;font-weight:600;color:${textColor};margin-bottom:8px;">${r.region}</div>
          <div style="font-size:26px;font-weight:800;color:#2563eb;">${r.count}</div>
          <div style="font-size:11px;color:${textColor};margin-top:4px;">次测算</div>
          <div style="font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;">
            均GOP ${r.avg_gop}%<br>
            均回本 ${r.avg_pb}年
          </div>
        </div>`;
    }).join('');
    document.getElementById('regionHeatmap').innerHTML = regionHtml;
  }
  
  // ═══════ ADR分布 ── 柱+折线 ═══════
  if (d.adr_distribution.length > 0) {
    chartInstances.adr = new Chart(document.getElementById('chartADR'), {
      type: 'bar',
      data: {
        labels: d.adr_distribution.map(a => a.bin),
        datasets: [
          {
            label: '提交数', yAxisID: 'y',
            data: d.adr_distribution.map(a => a.count),
            backgroundColor: C.cyanBg, borderColor: C.cyan, borderWidth: 1, borderRadius: 4
          },
          {
            label: '平均GOP(%)', yAxisID: 'y1', type:'line',
            data: d.adr_distribution.map(a => a.avg_gop),
            borderColor: C.orange, backgroundColor: 'transparent',
            tension: 0.3, pointRadius: 5, pointBackgroundColor: C.orange,
            borderWidth: 2
          }
        ]
      },
      options: chartOptions({
        scales: defaultScales({
          y: { position:'left', title:{display:true,text:'提交数',color:C.tick} },
          y1: { position:'right', title:{display:true,text:'GOP%',color:C.tick}, grid:{display:false} },
          x: { ticks:{color:C.text} }
        })
      })
    });
  }
  
  // ═══════ 回本年限分布 ── 渐变色柱状 ═══════
  if (d.payback_distribution.length > 0) {
    const pbColors = ['#10b981','#84cc16','#f59e0b','#f97316','#ef4444','#ec4899'];
    chartInstances.pb = new Chart(document.getElementById('chartPayback'), {
      type: 'bar',
      data: {
        labels: d.payback_distribution.map(p => p.bin),
        datasets: [{
          data: d.payback_distribution.map(p => p.count),
          backgroundColor: d.payback_distribution.map((_, i) => pbColors[i] || C.accent),
          borderRadius: 6
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: defaultScales({ x: { ticks:{color:C.text} } }),
        plugins: { legend: { display: false } }
      }
    });
  }
  
  // ═══════ 散点气泡图 ═══════
  if (d.scatter.length > 0) {
    const points = d.scatter.map(s => ({
      x: s.rooms,
      y: s.investment,
      r: Math.max(5, Math.min(24, Math.sqrt(Math.max(1, s.investment || 500)) * 0.55)),
      gop: s.gop_ratio || 0,
      pb: s.payback_years || 5,
      city: s.city || '?',
      cityTier: s.city_tier || 4,
      rooms: s.rooms || 0,
      inv: s.investment || 0
    }));

    // GOP 分类统计
    const good = points.filter(p => p.gop >= 55);
    const ok   = points.filter(p => p.gop >= 40 && p.gop < 55);
    const bad  = points.filter(p => p.gop < 40);

    // 图例
    document.getElementById('scatterLegend').innerHTML = `
      <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--text);">GOP率分布</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);">
        <span style="width:12px;height:12px;border-radius:50%;background:var(--green);display:inline-block;"></span>
        优质 ≥55% <b style="margin-left:auto;">${good.length}</b>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);">
        <span style="width:12px;height:12px;border-radius:50%;background:var(--orange);display:inline-block;"></span>
        一般 40-55% <b style="margin-left:auto;">${ok.length}</b>
      </div>
      <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);">
        <span style="width:12px;height:12px;border-radius:50%;background:var(--red);display:inline-block;"></span>
        风险 &lt;40% <b style="margin-left:auto;">${bad.length}</b>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0;">
      <div style="font-size:11px;color:var(--muted);">总计 ${points.length} 个项目</div>
    `;

    // GOP颜色函数
    function gopColor(gop) {
      if (gop >= 55) return { bg: 'rgba(16,185,129,0.45)', border: '#059669' };
      if (gop >= 40) return { bg: 'rgba(245,158,11,0.45)', border: '#d97706' };
      return { bg: 'rgba(239,68,68,0.42)', border: '#dc2626' };
    }

    chartInstances.scatter = new Chart(document.getElementById('chartScatter'), {
      type: 'bubble',
      data: {
        datasets: [{
          data: points,
          backgroundColor: points.map(p => gopColor(p.gop).bg),
          borderColor: points.map(p => gopColor(p.gop).border),
          borderWidth: 1.5,
          hoverBorderWidth: 3,
          hoverBorderColor: '#1e293b',
          hoverRadius: (ctx) => ctx.raw ? ctx.raw.r + 6 : 20,
          hoverBackgroundColor: points.map(p => {
            const c = gopColor(p.gop);
            return c.bg.replace('0.45','0.72').replace('0.42','0.68');
          })
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 600 },
        scales: defaultScales({
          x: {
            title: { display: true, text: '房间数', color: C.tick, font: { size: 13, weight: 'bold' } },
            ticks: { color: C.tick }, grid: { color: C.grid },
            min: 0
          },
          y: {
            title: { display: true, text: '投资额 (万元)', color: C.tick, font: { size: 13, weight: 'bold' } },
            ticks: { color: C.tick, callback: v => '¥' + (v/10000 >= 1 ? (v/10000).toFixed(1)+'亿' : v+'万') },
            grid: { color: C.grid },
            min: 0
          }
        }),
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(255,255,255,0.96)',
            titleColor: '#1e293b',
            bodyColor: '#475569',
            borderColor: C.border,
            borderWidth: 1,
            padding: 12,
            cornerRadius: 10,
            titleFont: { size: 14, weight: 'bold' },
            bodyFont: { size: 13 },
            callbacks: {
              title: ctx => ctx[0].raw.city || '未知城市',
              label: ctx => {
                const p = ctx.raw;
                const tierNames = {1:'一线',2:'新一线/二线',3:'三线',4:'四线及以下'};
                const lines = [
                  `房间数: ${p.rooms}间`,
                  `投资额: ¥${Math.round(p.inv).toLocaleString()}万`,
                  `GOP率: ${p.gop.toFixed(1)}%`,
                  `回本: ${p.pb.toFixed(1)}年`,
                  `城市等级: ${tierNames[p.cityTier] || 'T'+p.cityTier}`
                ];
                return lines;
              }
            }
          }
        }
      },
      plugins: [{
        id: 'bubbleGlow',
        afterDatapointDraw(chart, args, opts) {
          const { ctx, dataIndex } = args;
          const meta = chart.getDatasetMeta(0);
          const point = meta.data[dataIndex];
          const p = points[dataIndex];
          if (!p || !point) return;

          // 仅在悬停时绘制光环
          if (point._active !== true && point.active !== true) return;

          ctx.save();
          ctx.beginPath();
          ctx.arc(point.x, point.y, point.options.radius + 6, 0, Math.PI * 2);
          const c = gopColor(p.gop);
          ctx.fillStyle = c.border.replace(')','').split(',').slice(0,3).join(',') + ',0.12)';
          ctx.fill();
          ctx.restore();
        }
      }]
    });
  }
  
  // ═══════ 最近提交表 ═══════
  document.getElementById('recentCount').textContent = d.recent.length;
  const verdictTag = {
    feasible: 'tag-feasible', challenging: 'tag-challenging',
    difficult: 'tag-difficult', impossible: 'tag-impossible'
  };
  const verdictLabel = {
    feasible: '✅ 可行', challenging: '🔶 挑战', difficult: '🔴 压力', impossible: '⚠ 不可行'
  };
  document.getElementById('recentTable').innerHTML = d.recent.length ? `
    <table>
      <thead><tr>
        <th>时间</th><th>城市</th><th>商圈</th><th>ADR</th><th>入住率</th><th>GOP率</th>
        <th>回本</th><th>房间</th><th>投资(万)</th><th>判词</th>
      </tr></thead>
      <tbody>
        ${d.recent.map(r => `
          <tr>
            <td>${new Date(r.created_at).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
            <td>${r.city || '—'}</td>
            <td>${r.district || '—'}</td>
            <td>¥${Math.round(r.adr||0)}</td>
            <td>${(r.occupancy||0).toFixed(1)}%</td>
            <td>${(r.gop_ratio||0).toFixed(1)}%</td>
            <td>${(r.payback_years||0).toFixed(1)}年</td>
            <td>${r.rooms||0}</td>
            <td>${Math.round(r.investment||0)}</td>
            <td><span class="tag ${verdictTag[r.verdict]||''}">${verdictLabel[r.verdict]||r.verdict}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  ` : '<p style="color:var(--muted); text-align:center; padding:30px;">暂无提交数据</p>';
}

// 启动
refreshDashboard();
setInterval(refreshDashboard, 60000);
</script>

</body>
</html>
